services:
  zfsi:
    build: .
    container_name: zfsi
    restart: unless-stopped
    environment:
      APP_PIN: "${APP_PIN:-1234}"
      AUTH_SECRET: "${AUTH_SECRET:-change-me-please}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      CORS_ORIGIN: "*"
    volumes:
      - ./data:/app/data           # SQLite 文件持久化到宿主 ./data
    ports:
      - "1050:8787"                # 对外开放，可用 http://服务器IP:1050 直接访问
