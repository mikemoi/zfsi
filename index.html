<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1f6f5c">
  <title>西语 Drill</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- ===== PIN 锁屏 ===== -->
  <div id="lockScreen" class="lockscreen" hidden>
    <div class="lockbox">
      <div class="lockicon">🔒</div>
      <h2 id="lockTitle">输入 PIN 解锁</h2>
      <p id="lockHint" class="lockhint"></p>
      <input id="pinInput" type="password" inputmode="numeric" autocomplete="off"
             placeholder="PIN" class="pinfield" />
      <input id="pinConfirm" type="password" inputmode="numeric" autocomplete="off"
             placeholder="再输一遍" class="pinfield" hidden />
      <div id="pinError" class="pinerror"></div>
      <button id="pinSubmit" class="primary wide">进入</button>
    </div>
  </div>

  <!-- ===== 顶栏 + 视图导航 ===== -->
  <header class="topbar">
    <div class="brand">西语 Drill</div>
    <nav class="viewnav">
      <button class="navbtn active" data-view="drill">练习</button>
      <button class="navbtn" data-view="stats">统计</button>
      <button class="navbtn" data-view="settings">设置</button>
    </nav>
    <span id="todayCount" class="today">今天 0 题</span>
  </header>

  <!-- ===== 练习视图 ===== -->
  <section id="view-drill" class="view">
    <div class="ladder">
      <div class="ladder-cap">顺着练 · 每满 20 题自动进入下一关　（也可点某关直接跳）</div>
      <nav id="typeSwitch" class="typeswitch"></nav>
    </div>

    <main class="card">
      <div class="badges">
        <span id="typeBadge" class="badge type">替换</span>
        <span id="levelBadge" class="badge level">A1</span>
        <span id="tagBadge" class="badge tag" hidden>最小对立</span>
      </div>

      <p id="context" class="context"></p>
      <p id="prompt" class="prompt">…</p>

      <div class="inputRow">
        <input id="answer" type="text" autocomplete="off" autocapitalize="off"
               autocorrect="off" spellcheck="false"
               lang="es" placeholder="用西班牙语打出完整句子…" />
        <button id="micBtn" class="mic" title="语音作答（es-ES）" aria-label="语音作答">🎤</button>
        <button id="submitBtn" class="primary">作答</button>
      </div>
      <p id="speedHint" class="speedHint" hidden>加快速度，不要想太久。</p>

      <div id="feedback" class="feedback" hidden>
        <div id="verdict" class="verdict"></div>
        <div class="answerLine">
          <span class="label">标准答案</span>
          <span id="canonical" class="canonical"></span>
          <button id="listenBtn" class="ghost" title="朗读">🔊</button>
        </div>
        <div id="note" class="note" hidden></div>
        <div class="fbActions">
          <button id="actuallyRightBtn" class="ghost" hidden>我其实对了 →加入可接受</button>
          <button id="nextBtn" class="primary">下一题</button>
        </div>
      </div>
    </main>

    <footer class="statusbar">
      <span id="groupCount">本组 0/20</span>
      <span id="groupAvg" hidden></span>
    </footer>
  </section>

  <!-- ===== 统计视图 ===== -->
  <section id="view-stats" class="view" hidden>
    <div id="statsBody" class="panel"></div>
    <h3 class="stat-h">场景里程碑</h3>
    <div id="scenariosBody" class="panel"></div>
  </section>

  <!-- ===== 设置视图 ===== -->
  <section id="view-settings" class="view" hidden>
    <div id="settingsBody" class="panel"></div>
  </section>

  <script src="js/data.js"></script>
  <script src="js/scenarios.js"></script>
  <script src="js/api.js"></script>
  <script src="js/judge.js"></script>
  <script src="js/srs.js"></script>
  <script src="js/store.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
